# =========================
# Color System
# =========================

# Text
$primary_text = rgba(255, 255, 255, 0.90)
$secondary_text = rgba(255, 255, 255, 0.60)
$muted_text = rgba(255, 255, 255, 0.45)

# Glass
$glass_fill = rgba(255, 255, 255, 0.10)
$soft_border = rgba(255, 255, 255, 0.18)

# State
$success = rgba(140, 255, 180, 0.90)
$error = rgba(255, 140, 140, 0.90)
$warning = rgba(255, 220, 140, 0.90)


# =========================
# Font
# =========================

$font = JetBrainsMono Nerd Font Propo


# =========================
# General
# =========================

general {
    grace = 2
    hide_cursor = false
    no_fade_in = false
}


# =========================
# Background
# =========================

background {
    monitor =
    path = screenshot

    blur_passes = 3
    blur_size = 8

    noise = 0.0
    contrast = 1.0
    brightness = 0.85
    vibrancy = 0.15
    vibrancy_darkness = 0.0
}


# =========================
# Time
# =========================

label {
    monitor =
    text = $TIME
    color = $primary_text

    font_size = 88
    font_family = $font

    position = 0, 140
    halign = center
    valign = center
}


# =========================
# Date
# =========================

label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B %Y')"
    color = $secondary_text

    font_size = 18
    font_family = $font

    position = 0, 55
    halign = center
    valign = center
}


# =========================
# Lock Icon
# =========================

label {
    monitor =
    text =  󰌾  
    color = $primary_text

    font_size = 32
    font_family = $font

    position = 0, -20
    halign = center
    valign = center
}


# =========================
# Greeting
# =========================

label {
    monitor =
    text = Welcome back, $USER
    color = $muted_text

    font_size = 14
    font_family = $font

    position = 0, -70
    halign = center
    valign = center
}


# =========================
# Password Field
# =========================

input-field {
    monitor =
    size = 320, 56
    rounding = 14
    outline_thickness = 2

    dots_size = 0.22
    dots_spacing = 0.18
    dots_center = true

    outer_color = $soft_border
    inner_color = $glass_fill
    font_color = $primary_text

    fade_on_empty = false
    placeholder_text = Enter Password

    check_color = $success
    fail_color = $error
    capslock_color = $warning

    position = 0, -135
    halign = center
    valign = center
}
